# Phase 3：Windows 安装包（NSIS）。与 docs/architecture.md §10 对齐。
# - 每次手动运行或打 v* 标签时构建；产物上传为 workflow artifact。
# - 仅在 push 版本标签时附加到 GitHub Release（需先有对应 tag / release 语义由 action 处理）。

name: Release (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build Tauri bundle (NSIS only)
        run: npm run desktop:release-nsis

      - name: Upload NSIS bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/

      - name: Attach installers to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
