<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PLVS · Abyss Theme Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>

/* ── Abyss: bioluminescent cyan × volcanic coral ──────── */
:root {
  /* depths */
  --bg:          #020c11;
  --bg2:         #041620;
  --card:        #051b27;
  --card-hi:     #072330;

  /* cold ambient — bioluminescent cyan */
  --cyan:        #28c4cc;
  --cyan-hi:     #54dce4;
  --cyan-dim:    #166872;
  --cyan-ghost:  #0b3540;

  /* hot signal — volcanic coral */
  --coral:       #ff5040;
  --coral-hi:    #ff7860;
  --coral-dim:   #c83828;
  --coral-ghost: rgba(255,80,64,0.08);

  /* semantic */
  --fg:          var(--cyan);
  --fg-hi:       var(--cyan-hi);
  --fg-muted:    var(--cyan-dim);
  --fg-ghost:    var(--cyan-ghost);
  --accent:      var(--coral);
  --accent-hi:   var(--coral-hi);

  /* border: cold */
  --border:      rgba(0,195,210,0.08);
  --border-hi:   rgba(0,195,210,0.20);
  --border-warm: rgba(255,80,64,0.22);

  --font-head:   'Rajdhani', sans-serif;
  --font-mono:   'Space Mono', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 10px;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── Depth atmosphere ────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 100%,
      rgba(0,100,120,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 100% 40% at 50% 0%,
      rgba(0,50,70,0.08) 0%, transparent 50%);
  pointer-events: none; z-index: 1;
}

/* Coral pulse — top right corner, like a heat source */
body::after {
  content: '';
  position: fixed;
  top: -40px; right: -40px;
  width: 280px; height: 280px;
  background: radial-gradient(circle,
    rgba(255,80,64,0.06) 0%,
    rgba(255,80,64,0.02) 40%,
    transparent 70%);
  pointer-events: none; z-index: 1;
  animation: coral-breathe 4s ease-in-out infinite;
}

@keyframes coral-breathe {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.5; transform:scale(0.85); }
}

/* ── Film grain ──────────────────────────────────────── */
@keyframes grain {
  0%,100%{transform:translate(0,0)}  10%{transform:translate(-1%,-2%)}
  20%{transform:translate(2%,1%)}    30%{transform:translate(-1%,3%)}
  40%{transform:translate(3%,-1%)}   50%{transform:translate(-2%,2%)}
  60%{transform:translate(1%,-3%)}   70%{transform:translate(-3%,1%)}
  80%{transform:translate(2%,-1%)}   90%{transform:translate(-1%,3%)}
}
.grain {
  position:fixed; inset:-100%; width:300%; height:300%;
  background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  opacity:0.025; pointer-events:none; z-index:800;
  animation:grain 0.45s steps(1) infinite;
}

/* ── Shell ───────────────────────────────────────────── */
.shell {
  position:relative; z-index:2;
  height:100vh;
  display:grid;
  grid-template-rows: 40px 1fr 30px;
  max-width:1200px;
  margin:0 auto;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
}

/* ── Header ──────────────────────────────────────────── */
.header {
  display:flex; align-items:center; gap:14px;
  padding:0 18px;
  background:var(--bg2);
  border-bottom:1px solid var(--border-hi);
  position:relative; overflow:hidden;
}

/* Two-tone divider line: coral left, cyan right */
.header::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg,
    var(--coral) 0%,
    rgba(255,80,64,0.6) 20%,
    rgba(0,195,210,0.4) 60%,
    var(--cyan) 100%);
  opacity:0.55;
}

.logo {
  font-family:var(--font-head);
  font-size:18px; font-weight:700;
  letter-spacing:0.20em;
  /* Split gradient: half coral, half cyan */
  background: linear-gradient(90deg, var(--coral) 0%, var(--coral) 45%, var(--cyan) 55%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex-shrink:0;
}

.h-sep { width:1px; height:16px; background:var(--border-hi); flex-shrink:0; }

.device-block { display:flex; flex-direction:column; gap:1px; }
.device-name  { font-size:9px; letter-spacing:0.06em; color:var(--cyan); }
.device-sub   { font-size:8px; letter-spacing:0.08em; color:var(--cyan-dim); }

.hspacer { flex:1; }

@keyframes ping-coral {
  0%,100% { box-shadow:0 0 0 0 rgba(255,80,64,0.6), 0 0 6px rgba(255,80,64,0.4); opacity:1; }
  50%     { box-shadow:0 0 0 4px rgba(255,80,64,0), 0 0 2px rgba(255,80,64,0.2); opacity:0.6; }
}

.status {
  display:flex; align-items:center; gap:6px;
  font-size:8px; letter-spacing:0.12em; color:var(--cyan-dim);
}
.status-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--coral);
  animation:ping-coral 2.6s ease-in-out infinite;
}

.theme-chip {
  font-family:var(--font-head);
  font-size:8px; font-weight:600; letter-spacing:0.22em;
  text-transform:uppercase;
  border:1px solid var(--border-warm);
  color:var(--coral);
  padding:2px 7px; border-radius:2px;
}

/* ── Main grid ───────────────────────────────────────── */
.main {
  display:grid;
  grid-template-columns: 104px 1fr 196px;
  gap:1px; background:var(--border);
  overflow:hidden;
}

/* ── Panel base ──────────────────────────────────────── */
.panel {
  background:var(--card);
  display:flex; flex-direction:column;
  overflow:hidden; position:relative;
}

.panel::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,
    rgba(0,180,200,0.03) 0%, transparent 55%);
  pointer-events:none;
}

.ptitle {
  font-family:var(--font-head);
  font-size:8px; font-weight:600;
  letter-spacing:0.22em; text-transform:uppercase;
  color:var(--cyan-dim);
  padding:7px 10px 5px;
  border-bottom:1px solid var(--border);
  flex-shrink:0; position:relative;
}

/* ── Peak Meters ─────────────────────────────────────── */
.meters-body {
  flex:1; display:grid;
  grid-template-columns:18px 1fr 1fr;
  gap:3px; padding:6px 8px 4px;
  overflow:hidden;
}

.scale {
  display:flex; flex-direction:column;
  justify-content:space-between;
  padding-top:2px; padding-bottom:16px;
}

.stk { font-size:7px; color:var(--cyan-ghost); text-align:right; line-height:1; }
.stk.b { color:var(--cyan-dim); }

.mcol {
  display:flex; flex-direction:column;
  align-items:center; gap:3px;
}

.mtrack {
  flex:1; width:100%;
  border:1px solid var(--border);
  border-radius:2px;
  background:rgba(0,195,210,0.02);
  display:flex; flex-direction:column;
  justify-content:flex-end;
  overflow:hidden; position:relative;
}

/* segment notches */
.mtrack::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0, transparent 5px,
    rgba(0,195,210,0.035) 5px, rgba(0,195,210,0.035) 6px
  );
  pointer-events:none;
}

/* The clash gradient: coral/hot at top, cyan at bottom */
.mfill {
  width:100%;
  background: linear-gradient(to top,
    #186872  0%,
    #28c4cc  18%,
    #40a080  35%,
    #ff8040  55%,
    #ff5040  72%,
    #ff2800  88%,
    #ff0000 100%
  );
  border-radius:1px;
  position:relative; will-change:height;
}

/* Hot-line shimmer at fill top */
.mfill::after {
  content:'';
  position:absolute; top:0; left:10%; right:10%;
  height:1px;
  background:rgba(255,140,100,0.7);
  box-shadow:0 0 4px rgba(255,100,80,0.8);
}

.peak-hold {
  position:absolute; width:calc(100% - 2px); left:1px;
  height:2px;
  background:var(--coral-hi);
  box-shadow:0 0 5px rgba(255,120,96,0.9), 0 0 12px rgba(255,80,64,0.4);
  border-radius:1px; will-change:bottom;
}

.mread {
  font-size:8px; color:var(--cyan);
  flex-shrink:0; height:12px;
  display:flex; align-items:center; justify-content:center;
}

.mch {
  font-family:var(--font-head);
  font-size:9px; font-weight:600; letter-spacing:0.12em;
  color:var(--cyan-dim);
}

/* ── Center column ───────────────────────────────────── */
.center-col {
  display:grid; grid-template-rows:1fr auto;
  gap:1px; background:var(--border);
}

/* ── History ─────────────────────────────────────────── */
.history-body {
  flex:1; padding:8px 10px;
  position:relative; overflow:hidden; min-height:0;
}

.hsvg { width:100%; height:100%; overflow:visible; }

/* ── Metrics ─────────────────────────────────────────── */
.metrics {
  background:var(--card);
  padding:6px 10px;
  display:grid;
  grid-template-columns:repeat(3,1fr) 28px;
  gap:5px; align-items:start;
  flex-shrink:0;
}

.mcard {
  display:flex; flex-direction:column; gap:2px;
  padding:5px 7px;
  background:rgba(0,195,210,0.02);
  border:1px solid var(--border);
  border-radius:2px;
  transition:background 0.3s, border-color 0.3s;
}

.mcard.hot {
  background:rgba(255,80,64,0.05);
  border-color:var(--border-warm);
  box-shadow:inset 0 0 14px rgba(255,60,40,0.04);
}

.mname {
  font-size:7px; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--cyan-dim);
}

.mval {
  font-size:22px; font-weight:400;
  letter-spacing:-0.03em; line-height:1;
  color:var(--cyan-hi);
  text-shadow:0 0 12px rgba(40,196,204,0.25);
}

.mval.hot {
  color:var(--coral-hi);
  text-shadow:0 0 10px rgba(255,100,80,0.4), 0 0 24px rgba(255,80,64,0.18);
}

.munit { font-size:7px; letter-spacing:0.1em; color:var(--cyan-ghost); }

/* Vertical correlation bar */
.corr-col {
  display:flex; flex-direction:column;
  align-items:center; gap:3px;
  padding:4px 0;
}

.corr-label {
  font-size:7px; letter-spacing:0.15em;
  text-transform:uppercase; color:var(--cyan-dim);
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  line-height:1;
}

.corr-track {
  flex:1; width:3px;
  background:var(--border); border-radius:2px;
  position:relative; overflow:hidden;
}

/* Two-tone corr fill: coral=bad at bottom, cyan=good at top */
.corr-fill {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top, var(--coral-dim), var(--coral), var(--cyan), var(--cyan-hi));
  border-radius:2px;
}

.corr-num {
  font-size:8px; color:var(--cyan);
  font-weight:700;
}

/* ── Right column ────────────────────────────────────── */
.right-col {
  display:grid; grid-template-rows:1fr 1fr;
  gap:1px; background:var(--border);
}

.cw {
  flex:1; padding:6px; display:flex; min-height:0;
}

.rc { width:100%; height:100%; display:block; }

/* ── Footer ──────────────────────────────────────────── */
.footer {
  display:flex; align-items:center; gap:14px;
  padding:0 18px;
  background:var(--bg2);
  border-top:1px solid var(--border-hi);
  position:relative; overflow:hidden;
}

.footer::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,
    var(--cyan) 0%,
    rgba(0,195,210,0.6) 20%,
    rgba(255,80,64,0.4) 60%,
    var(--coral) 100%);
  opacity:0.5;
}

.fi { display:flex; align-items:center; gap:5px; font-size:8px; letter-spacing:0.08em; color:var(--cyan-dim); }
.fv { color:var(--cyan); }
.fv.hot { color:var(--coral); }
.fsp { flex:1; }

/* Target progress */
.tgt-bar { width:60px; height:2px; background:var(--border); border-radius:1px; position:relative; overflow:hidden; }
.tgt-fill {
  height:100%; width:62%;
  background:linear-gradient(90deg, var(--cyan-dim), var(--coral));
  border-radius:1px;
}

</style>
</head>
<body>
<div class="grain"></div>

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="logo">PLVS</div>
    <div class="h-sep"></div>
    <div class="device-block">
      <div class="device-name">BlackHole 2ch</div>
      <div class="device-sub">48 kHz · 32-bit float</div>
    </div>
    <div class="hspacer"></div>
    <div class="status">
      <div class="status-dot"></div>
      <span>MONITORING</span>
    </div>
    <div class="h-sep"></div>
    <div class="theme-chip">Abyss</div>
  </header>

  <!-- Main -->
  <div class="main">

    <!-- Peak meters -->
    <div class="panel">
      <div class="ptitle">Peak · dBFS</div>
      <div class="meters-body">
        <div class="scale">
          <div class="stk b">0</div>
          <div class="stk">−3</div>
          <div class="stk b">−6</div>
          <div class="stk">−9</div>
          <div class="stk b">−12</div>
          <div class="stk">−18</div>
          <div class="stk b">−24</div>
          <div class="stk">−40</div>
        </div>
        <div class="mcol">
          <div class="mtrack" id="tl">
            <div class="mfill" id="fl" style="height:70%"></div>
            <div class="peak-hold" id="pl" style="bottom:72%"></div>
          </div>
          <div class="mread" id="rl">−8.3</div>
          <div class="mch">L</div>
        </div>
        <div class="mcol">
          <div class="mtrack" id="tr">
            <div class="mfill" id="fr" style="height:62%"></div>
            <div class="peak-hold" id="pr" style="bottom:64%"></div>
          </div>
          <div class="mread" id="rr">−9.8</div>
          <div class="mch">R</div>
        </div>
      </div>
    </div>

    <!-- Center -->
    <div class="center-col">
      <div class="panel">
        <div class="ptitle">Loudness History</div>
        <div class="history-body">
          <svg class="hsvg" id="hsvg" viewBox="0 0 640 180" preserveAspectRatio="none">
            <!-- Grid -->
            <line x1="0" y1="36"  x2="640" y2="36"  stroke="rgba(255,80,64,0.20)" stroke-width="1" stroke-dasharray="3 4"/>
            <line x1="0" y1="70"  x2="640" y2="70"  stroke="rgba(0,195,210,0.05)" stroke-width="1"/>
            <line x1="0" y1="100" x2="640" y2="100" stroke="rgba(0,195,210,0.07)" stroke-width="1"/>
            <line x1="0" y1="135" x2="640" y2="135" stroke="rgba(0,195,210,0.05)" stroke-width="1"/>
            <text x="4" y="33" font-family="Space Mono" font-size="7" fill="rgba(255,80,64,0.50)" letter-spacing="0.04em">−23 LUFS target</text>
            <!-- Short-term: CYAN -->
            <path id="stfill" fill="rgba(40,196,204,0.07)"/>
            <path id="stline" fill="none" stroke="#28c4cc" stroke-width="1.2" stroke-linejoin="round" opacity="0.7"/>
            <!-- Momentary: CORAL -->
            <path id="mfill"  fill="rgba(255,80,64,0.10)"/>
            <path id="mline"  fill="none" stroke="#ff5040" stroke-width="1.8" stroke-linejoin="round"/>
            <circle id="snap" r="3.5" fill="none" stroke="#ff7860" stroke-width="1.5" opacity="0.85"/>
          </svg>
        </div>
      </div>

      <div class="panel metrics">
        <div class="mcard">
          <div class="mname">Momentary</div>
          <div class="mval hot" id="mv">−14.2</div>
          <div class="munit">LUFS</div>
        </div>
        <div class="mcard hot">
          <div class="mname">Short-term</div>
          <div class="mval" id="sv" style="color:var(--cyan-hi)">−16.8</div>
          <div class="munit">LUFS</div>
        </div>
        <div class="mcard">
          <div class="mname">Integrated</div>
          <div class="mval" id="iv">−18.1</div>
          <div class="munit">LUFS</div>
        </div>
        <div class="corr-col">
          <div class="corr-label">Corr</div>
          <div class="corr-track">
            <div class="corr-fill" id="cfill" style="height:84%"></div>
          </div>
          <div class="corr-num" id="cnum">+.84</div>
        </div>
      </div>
    </div>

    <!-- Right -->
    <div class="right-col">
      <div class="panel">
        <div class="ptitle">Vectorscope</div>
        <div class="cw"><canvas class="rc" id="vc"></canvas></div>
      </div>
      <div class="panel">
        <div class="ptitle">Spectrum</div>
        <div class="cw"><canvas class="rc" id="sc"></canvas></div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="fi"><span>Duration</span><span class="fv" id="dur">0:42</span></div>
    <div class="fi">
      <span>Target</span>
      <span class="fv">−23 LUFS</span>
      <div class="tgt-bar"><div class="tgt-fill"></div></div>
    </div>
    <div class="fi"><span>True Peak</span><span class="fv hot">−1.2 dBTP</span></div>
    <div class="fsp"></div>
    <div class="fi"><span>LRA</span><span class="fv">8.4 LU</span></div>
    <div class="fi"><span>PLVS</span><span class="fv">0.1.0</span></div>
  </footer>

</div>

<script>
// ── utils ──────────────────────────────────────────────
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const lerp  = (a,b,t)   => a+(b-a)*t;
function gauss() {
  let u=0,v=0;
  while(!u)u=Math.random(); while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

// ── Duration ───────────────────────────────────────────
let secs=42;
setInterval(()=>{
  secs++;
  const m=Math.floor(secs/60), s=secs%60;
  document.getElementById('dur').textContent=`${m}:${s.toString().padStart(2,'0')}`;
},1000);

// ── Peak Meters ────────────────────────────────────────
let mL=0.70, mR=0.62, hL=0.72, hR=0.64, htL=0, htR=0;
const fl=document.getElementById('fl'), fr=document.getElementById('fr');
const pl=document.getElementById('pl'), pr=document.getElementById('pr');
const rl=document.getElementById('rl'), rr=document.getElementById('rr');

function meterTick(t) {
  mL=clamp(mL+gauss()*0.022,0.30,0.92);
  mR=clamp(mR+gauss()*0.022,0.25,0.88);
  if(mL>hL){hL=mL;htL=t;} if(mR>hR){hR=mR;htR=t;}
  if(t-htL>1600)hL=Math.max(hL-0.002,mL);
  if(t-htR>1600)hR=Math.max(hR-0.002,mR);
  fl.style.height=(mL*100).toFixed(1)+'%';
  fr.style.height=(mR*100).toFixed(1)+'%';
  pl.style.bottom=(hL*100).toFixed(1)+'%';
  pr.style.bottom=(hR*100).toFixed(1)+'%';
  rl.textContent=(-60*(1-mL)).toFixed(1);
  rr.textContent=(-60*(1-mR)).toFixed(1);
  requestAnimationFrame(meterTick);
}
requestAnimationFrame(meterTick);

// ── Loudness History ───────────────────────────────────
const N=90, W=640, H=180;
const LMIN=-36, LMAX=-6;
const toY = l => ((l-LMAX)/(LMIN-LMAX))*H;
const pathD = arr => arr.map((v,i)=>`${i===0?'M':'L'}${((i/(N-1))*W).toFixed(1)} ${toY(v).toFixed(1)}`).join(' ');
const fillD = arr => pathD(arr)+` L ${W} ${H} L 0 ${H} Z`;

let curM=-14.2, curS=-16.8, curI=-18.1;
let mH=Array.from({length:N},(_,i)=>lerp(-22,-14,i/N)+gauss()*2);
let sH=Array.from({length:N},(_,i)=>lerp(-24,-17,i/N)+gauss()*1.2);
const mline=document.getElementById('mline'), mfill=document.getElementById('mfill');
const stline=document.getElementById('stline'), stfill=document.getElementById('stfill');
const snap=document.getElementById('snap');
const mvEl=document.getElementById('mv'), svEl=document.getElementById('sv'), ivEl=document.getElementById('iv');
const cfEl=document.getElementById('cfill'), cnEl=document.getElementById('cnum');

setInterval(()=>{
  curM=clamp(curM+gauss()*0.7,-30,-8);
  curS=clamp(curS+gauss()*0.35,-28,-10);
  curI=lerp(curI,curM-3,0.004);
  mH.shift(); mH.push(curM);
  sH.shift(); sH.push(curS);
  mline.setAttribute('d',pathD(mH));
  mfill.setAttribute('d',fillD(mH));
  stline.setAttribute('d',pathD(sH));
  stfill.setAttribute('d',fillD(sH));
  snap.setAttribute('cx',W); snap.setAttribute('cy',toY(curM).toFixed(1));
  mvEl.textContent=curM.toFixed(1);
  svEl.textContent=curS.toFixed(1);
  ivEl.textContent=curI.toFixed(1);
  const c=clamp(0.82+gauss()*0.04,0.55,0.99);
  cfEl.style.height=(c*100).toFixed(0)+'%';
  cnEl.textContent='+.'+String(Math.round(c*100)).padStart(2,'0');
},110);

// ── Vectorscope ────────────────────────────────────────
(function(){
  const cv=document.getElementById('vc');
  const dpr=window.devicePixelRatio||1;
  function resize(){
    const r=cv.parentElement.getBoundingClientRect();
    cv.width=r.width*dpr; cv.height=r.height*dpr;
    cv.style.width=r.width+'px'; cv.style.height=r.height+'px';
  }
  resize(); new ResizeObserver(resize).observe(cv.parentElement);
  const ctx=cv.getContext('2d');

  // Particles: most in-phase (upper-right), slight spread
  const PARTS=300;
  const pts=Array.from({length:PARTS},()=>{
    const a=Math.PI/4+(Math.random()-0.5)*0.8;
    const m=0.2+Math.random()*0.65;
    return {a,m,va:(Math.random()-0.5)*0.004,vm:(Math.random()-0.5)*0.003};
  });

  function draw(){
    const W=cv.width, H=cv.height, cx=W/2, cy=H/2;
    const R=Math.min(cx,cy)*0.80;

    // Fade — slightly warm tint
    ctx.fillStyle='rgba(5,27,39,0.16)';
    ctx.fillRect(0,0,W,H);

    // Grid (cyan)
    ctx.save();
    ctx.setLineDash([3*dpr,4*dpr]);
    ctx.strokeStyle='rgba(0,195,210,0.10)'; ctx.lineWidth=0.5*dpr;
    ctx.beginPath();
    ctx.moveTo(cx-R*1.1,cy); ctx.lineTo(cx+R*1.1,cy);
    ctx.moveTo(cx,cy-R*1.1); ctx.lineTo(cx,cy+R*1.1);
    ctx.stroke();
    ctx.strokeStyle='rgba(0,195,210,0.14)';
    const d=R*0.75;
    ctx.beginPath();
    ctx.moveTo(cx-d,cy-d); ctx.lineTo(cx+d,cy+d);
    ctx.moveTo(cx+d,cy-d); ctx.lineTo(cx-d,cy+d);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,195,210,0.08)'; ctx.stroke();
    ctx.restore();

    // Particles — coral with occasional cyan glints
    for(const p of pts){
      p.a+=p.va+(Math.random()-0.5)*0.003;
      p.m+=p.vm+(Math.random()-0.5)*0.004;
      p.a=clamp(p.a,-0.2,Math.PI*0.65);
      p.m=clamp(p.m,0.04,0.94);
      const px=cx+Math.cos(p.a)*p.m*R;
      const py=cy-Math.sin(p.a)*p.m*R;
      const isCyan=Math.random()<0.08;
      const alpha=0.30+Math.random()*0.55;
      ctx.beginPath();
      ctx.arc(px,py,0.75*dpr,0,Math.PI*2);
      ctx.fillStyle=isCyan
        ? `rgba(80,220,228,${alpha})`
        : `rgba(255,80,64,${alpha})`;
      ctx.fill();
    }

    // Labels (cyan)
    ctx.fillStyle='rgba(40,196,204,0.30)';
    ctx.font=`${8*dpr}px 'Space Mono'`;
    ctx.fillText('L',cx-R*1.08-4*dpr,cy-4*dpr);
    ctx.fillText('R',cx+R*1.0+2*dpr,cy-4*dpr);
    ctx.fillText('M',cx-5*dpr,cy-R*1.04);
    ctx.fillText('S',cx-5*dpr,cy+R*1.12);
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Spectrum ───────────────────────────────────────────
(function(){
  const cv=document.getElementById('sc');
  const dpr=window.devicePixelRatio||1;
  function resize(){
    const r=cv.parentElement.getBoundingClientRect();
    cv.width=r.width*dpr; cv.height=r.height*dpr;
    cv.style.width=r.width+'px'; cv.style.height=r.height+'px';
  }
  resize(); new ResizeObserver(resize).observe(cv.parentElement);
  const ctx=cv.getContext('2d');
  const BINS=72;
  let vals=Array.from({length:BINS},(_,i)=>{
    const f=i/BINS;
    return clamp(
      0.78*Math.exp(-Math.pow((f-0.08)*5,2))+
      0.55*Math.exp(-Math.pow((f-0.22)*6,2))+
      0.42*Math.exp(-Math.pow((f-0.44)*5,2))+
      0.28*(1-f)*0.7+gauss()*0.06,0.02,0.95);
  });
  let snaps=vals.slice();

  function draw(){
    const W=cv.width, H=cv.height;
    ctx.clearRect(0,0,W,H);
    // Grid
    ctx.strokeStyle='rgba(0,195,210,0.06)'; ctx.lineWidth=0.5*dpr;
    for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(0,H*i/4);ctx.lineTo(W,H*i/4);ctx.stroke();}
    // Update
    for(let i=0;i<BINS;i++){
      const t=clamp(
        0.78*Math.exp(-Math.pow((i/BINS-0.08)*5,2))+
        0.55*Math.exp(-Math.pow((i/BINS-0.22)*6,2))+
        0.42*Math.exp(-Math.pow((i/BINS-0.44)*5,2))+
        0.28*(1-i/BINS)*0.7+gauss()*0.10,0.02,0.95);
      vals[i]=lerp(vals[i],t,0.20);
      snaps[i]=Math.max(snaps[i]*0.994,vals[i]);
    }
    const bw=W/BINS;
    // Snap line — CYAN
    ctx.beginPath();
    for(let i=0;i<BINS;i++){
      const x=i*bw+bw*0.5, y=H-snaps[i]*H*0.92;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle='rgba(40,196,204,0.45)'; ctx.lineWidth=1*dpr; ctx.stroke();
    // Fill under live — coral tint
    ctx.beginPath();
    for(let i=0;i<BINS;i++){
      const x=i*bw+bw*0.5, y=H-vals[i]*H*0.92;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'rgba(255,80,64,0.20)');
    g.addColorStop(0.5,'rgba(255,80,64,0.07)');
    g.addColorStop(1,'rgba(255,80,64,0.01)');
    ctx.fillStyle=g; ctx.fill();
    // Live line — CORAL
    ctx.beginPath();
    for(let i=0;i<BINS;i++){
      const x=i*bw+bw*0.5, y=H-vals[i]*H*0.92;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle='#ff5040'; ctx.lineWidth=1.5*dpr; ctx.stroke();
    // Glow
    ctx.beginPath();
    for(let i=0;i<BINS;i++){
      const x=i*bw+bw*0.5, y=H-vals[i]*H*0.92;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle='rgba(255,140,120,0.22)'; ctx.lineWidth=3.5*dpr; ctx.stroke();
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
